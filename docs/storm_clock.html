<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>太阳风暴预警钟 ☀️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#c8d6e5;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.header{text-align:center;padding:30px 20px 10px;width:100%}
.header h1{font-size:1.8em;font-weight:300;letter-spacing:6px;color:#e8f0f8}
.header h1 span{display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.subtitle{color:#5a7a9a;font-size:.85em;margin-top:4px;letter-spacing:2px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:520px;padding:16px;flex:1}
@media(max-width:420px){.grid{grid-template-columns:1fr;gap:12px;padding:10px}.header h1{font-size:1.3em}}
/* Clock */
.clock-card{grid-column:1/-1;background:linear-gradient(145deg,#111827,#0d1520);border-radius:20px;padding:30px 20px;text-align:center;border:1px solid rgba(59,130,246,.15);box-shadow:0 8px 32px rgba(0,0,0,.4);position:relative;overflow:hidden}
.clock-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#3b82f6,transparent)}
.gauge{position:relative;width:220px;height:220px;margin:0 auto}
.gauge svg{transform:rotate(-90deg);width:220px;height:220px}
.gauge-bg{fill:none;stroke:#1a2744;stroke-width:12}
.gauge-fill{fill:none;stroke-linecap:round;stroke-width:12;transition:stroke-dashoffset 1.2s ease,stroke .6s ease}
.gauge-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.dst-value{font-size:4em;font-weight:200;color:#e8f0f8;line-height:1;letter-spacing:2px;transition:color .6s ease}
.dst-unit{font-size:.9em;color:#5a7a9a;margin-top:2px}
.storm-label{font-size:1.1em;font-weight:500;margin-top:8px;transition:color .6s ease;letter-spacing:1px}
/* Dst marks */
.gauge-marks{position:absolute;width:220px;height:220px;top:0;left:50%;transform:translateX(-50%);pointer-events:none}
.mark{position:absolute;font-size:.55em;color:#3a5a7a;width:20px;text-align:center;transform-origin:110px 110px}
/* Metrics */
.metric{background:linear-gradient(145deg,#111827,#0d1520);border-radius:14px;padding:14px 16px;border:1px solid rgba(59,130,246,.08);transition:border-color .3s}
.metric:hover{border-color:rgba(59,130,246,.2)}
.metric-label{font-size:.72em;color:#5a7a9a;letter-spacing:1px;margin-bottom:3px}
.metric-value{font-size:1.5em;font-weight:300;color:#e8f0f8;letter-spacing:1px}
.metric-value .sub{font-size:.5em;color:#5a7a9a;margin-left:2px}
.metric-wide{grid-column:1/-1}
.metric-row{display:flex;gap:10px;justify-content:space-between}
.metric-row .metric{flex:1}
/* CME bar */
.cme-bar{height:6px;border-radius:3px;background:#1a2744;margin-top:8px;overflow:hidden;position:relative}
.cme-fill{height:100%;border-radius:3px;transition:width 1s ease;background:linear-gradient(90deg,#3b82f6,#8b5cf6)}
.cme-label{font-size:.65em;color:#5a7a9a;margin-top:4px;display:flex;justify-content:space-between}
/* Status */
.status-bar{grid-column:1/-1;display:flex;gap:6px;justify-content:center;padding:4px}
.status-dot{width:10px;height:10px;border-radius:50%;transition:background .6s ease;opacity:.7}
.status-dot.active{opacity:1;box-shadow:0 0 8px currentColor}
/* Footer */
.footer{text-align:center;padding:12px 20px;width:100%;font-size:.7em;color:#3a4a5a;letter-spacing:1px}
#update-time{color:#5a7a9a;font-size:.75em;margin-top:8px}
button{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#60a5fa;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:.75em;transition:all .3s}
button:hover{background:rgba(59,130,246,.2)}
</style></head>
<body>
<div class="header">
<h1><span>☀</span> 太阳风暴预警钟</h1>
<div class="subtitle">SOLAR STORM WARNING CLOCK · U(1) 框架集成</div>
</div>

<div class="grid" id="app">
<!-- Clock -->
<div class="clock-card">
<div class="gauge" id="gauge">
<svg viewBox="0 0 220 220">
<circle class="gauge-bg" cx="110" cy="110" r="88"/>
<circle class="gauge-fill" id="gauge-fill" cx="110" cy="110" r="88"
stroke-dasharray="553" stroke-dashoffset="0" stroke="#3b82f6"/>
</svg>
<div class="gauge-center">
<div class="dst-value" id="dst-val">--</div>
<div class="dst-unit">nT (Dst)</div>
<div class="storm-label" id="storm-level">读取中…</div>
</div>
</div>
<div class="time-row" style="display:flex;justify-content:center;gap:20px;margin-top:8px;font-size:.75em">
  <div>UTC <span id="update-time-utc">--</span></div>
  <div style="color:#8ab4f8">🇨🇳 东八区 <span id="update-time-cst">--</span></div>
</div>
</div>

<!-- SW Speed -->
<div class="metric">
<div class="metric-label">太阳风速</div>
<div class="metric-value" id="sw-speed">-- <span class="sub">km/s</span></div>
</div>

<!-- IMF Bz -->
<div class="metric">
<div class="metric-label">IMF Bz</div>
<div class="metric-value" id="imf-bz">-- <span class="sub">nT</span></div>
</div>

<!-- IMF Bt -->
<div class="metric">
<div class="metric-label">IMF Bt</div>
<div class="metric-value" id="imf-bt">-- <span class="sub">nT</span></div>
</div>

<!-- Density -->
<div class="metric">
<div class="metric-label">太阳风密度</div>
<div class="metric-value" id="sw-density">-- <span class="sub">/cc</span></div>
</div>

<!-- U(1) Phase -->
<div class="metric">
<div class="metric-label">U(1) 太阳相位</div>
<div class="metric-value" id="u1-phase">-- <span class="sub">°</span></div>
</div>

<!-- CME Potential -->
<div class="metric metric-wide">
<div class="metric-label">最新 CME 地磁潜力</div>
<div class="metric-value" id="cme-potential">-- <span class="sub">/10</span></div>
<div class="cme-bar"><div class="cme-fill" id="cme-bar-fill" style="width:0%"></div></div>
<div class="cme-label"><span id="cme-name">--</span><span id="cme-speed">-- km/s</span></div>
</div>

<!-- Status G-scale dots -->
<div class="status-bar" id="status-bar">
<div class="status-dot" style="background:#22c55e" title="G0 安静"></div>
<div class="status-dot" style="background:#eab308" title="G1 轻微"></div>
<div class="status-dot" style="background:#f97316" title="G2 中等"></div>
<div class="status-dot" style="background:#ef4444" title="G3 强"></div>
<div class="status-dot" style="background:#a855f7" title="G4 严重"></div>
<div class="status-dot" style="background:#7c3aed" title="G5 极强"></div>
</div>

<!-- Controls -->
<div class="metric metric-wide" style="text-align:center;border:none;background:transparent">
<button onclick="refreshData()">🔄 刷新数据</button>
</div>
</div>

<div class="footer">数据源: NOAA SWPC · DONKI · U(1) Solar Model | 预测仅供参考</div>

<script>
// === 参数 ===
const CIRCUMFERENCE = 2 * Math.PI * 88; // ~553
const G_LEVELS = [
  {max: -30, label:'G0 安静', color:'#22c55e'},
  {max: -50, label:'G1 轻微', color:'#eab308'},
  {max: -100, label:'G2 中等', color:'#f97316'},
  {max: -200, label:'G3 强',   color:'#ef4444'},
  {max: -350, label:'G4 严重', color:'#a855f7'},
  {max: -999, label:'G5 极强', color:'#7c3aed'}
];
let snapshot = null;

// === 内置快照 (2026-05-23 06:25 UTC) ===
const BUILTIN = {
  dst: -1, bz: -0.2, bt: 3.6, speed: 332, density: 1.8,
  phase: 4.1, cycle_peak: 2034.6,
  cme: {name:'2026-05-16 16:36Z', speed:1201, potential:4, t_arrival:27.2}
};

// === 工具函数 ===
function getGLevel(dst) {
  for (const g of G_LEVELS) {
    if (dst > g.max) return g;
  }
  return G_LEVELS[5];
}

function updateGauge(dst) {
  const g = getGLevel(dst);
  const fraction = Math.min((Math.abs(dst) + 30) / 350, 1);
  const offset = CIRCUMFERENCE * (1 - Math.min(fraction, 0.85));

  document.getElementById('dst-val').textContent = dst > 0 ? `+${dst}` : `${dst}`;
  document.getElementById('dst-val').style.color = g.color;
  document.getElementById('storm-level').textContent = g.label;
  document.getElementById('storm-level').style.color = g.color;

  const fill = document.getElementById('gauge-fill');
  fill.setAttribute('stroke-dashoffset', offset);
  fill.setAttribute('stroke', g.color);

  // Status dots
  document.querySelectorAll('.status-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === G_LEVELS.indexOf(g));
  });
}

function updateMetrics(data) {
  document.getElementById('sw-speed').innerHTML = `${data.speed} <span class="sub">km/s</span>`;
  document.getElementById('imf-bz').innerHTML = `${data.bz > 0 ? '+' : ''}${data.bz.toFixed(1)} <span class="sub">nT</span>`;
  document.getElementById('imf-bz').style.color = data.bz < 0 ? '#f87171' : '#34d399';
  document.getElementById('imf-bt').innerHTML = `${data.bt.toFixed(1)} <span class="sub">nT</span>`;
  document.getElementById('sw-density').innerHTML = `${data.density.toFixed(1)} <span class="sub">/cc</span>`;
  document.getElementById('u1-phase').innerHTML = `${data.phase.toFixed(1)} <span class="sub">°</span>`;

  if (data.cme) {
    document.getElementById('cme-potential').innerHTML = `${data.cme.potential} <span class="sub">/10</span>`;
    document.getElementById('cme-bar-fill').style.width = `${data.cme.potential * 10}%`;
    const cmeColors = ['#3b82f6','#3b82f6','#eab308','#eab308','#f97316','#f97316','#ef4444','#ef4444','#a855f7','#a855f7','#7c3aed'];
    document.getElementById('cme-bar-fill').style.background = cmeColors[data.cme.potential] || '#3b82f6';
    document.getElementById('cme-name').textContent = data.cme.name;
    document.getElementById('cme-speed').textContent = `${data.cme.speed} km/s`;
  }
}

function setUpdateTime() {
  const now = new Date();
  const s = now.toISOString().replace('T',' ').slice(0,19);
  document.getElementById('update-time').textContent = `🕐 ${s} UTC`;
}

// === NOAA 实时数据获取 ===
async function fetchNOAA() {
  try {
    // Try CORS proxy first, fallback to direct
    const urls = [
      'https://api.allorigins.win/raw?url=https://services.swpc.noaa.gov/products/kyoto-dst.json',
      'https://api.allorigins.win/raw?url=https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json',
      'https://api.allorigins.win/raw?url=https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json',
    ];
    const fallbackUrls = [
      'https://services.swpc.noaa.gov/products/kyoto-dst.json',
      'https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json',
      'https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json',
    ];

    let results = [];
    for (let i = 0; i < 3; i++) {
      try {
        let r = await fetch(fallbackUrls[i], {signal: AbortSignal.timeout(5000)});
        let d = await r.json();
        results.push(d);
      } catch {
        try {
          let r = await fetch(urls[i], {signal: AbortSignal.timeout(8000)});
          let d = await r.json();
          results.push(d);
        } catch {
          results.push(null);
        }
      }
    }
    return results;
  } catch { return [null, null, null]; }
}

// === 主刷新 ===
async function refreshData() {
  document.getElementById('update-time-utc').textContent = '读取中…'; document.getElementById('update-time-cst').textContent = '读取中…';

  let data = {...BUILTIN}; // start with builtin fallback

  try {
    const [dstRaw, plasmaRaw, imfRaw] = await fetchNOAA();

    if (dstRaw && dstRaw.length > 0) {
      const last = dstRaw[dstRaw.length - 1];
      const dstVal = typeof last === 'object' && last.dst !== undefined ? last.dst
                   : Array.isArray(last) ? parseFloat(last[1]) : null;
      if (dstVal !== null) data.dst = dstVal;
    }

    if (plasmaRaw && plasmaRaw.length > 1) {
      const last = plasmaRaw[plasmaRaw.length - 1];
      if (last[2]) data.speed = parseFloat(last[2]);
      if (last[1]) data.density = parseFloat(last[1]);
    }

    if (imfRaw && imfRaw.length > 1) {
      const last = imfRaw[imfRaw.length - 1];
      if (last[3]) data.bz = parseFloat(last[3]);
      if (last[6]) data.bt = parseFloat(last[6]);
    }
  } catch {}

  updateGauge(data.dst);
  updateMetrics(data);
  setUpdateTime();
  snapshot = data;
}

// === 初始加载 ===
document.addEventListener('DOMContentLoaded', () => {
  updateGauge(BUILTIN.dst);
  updateMetrics(BUILTIN);
  setUpdateTime();
  snapshot = BUILTIN;
  // Auto-refresh every 5 min
  setInterval(refreshData, 300000);
});
</script>
</body></html>
